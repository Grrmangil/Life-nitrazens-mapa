        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[39.597483841235096,-5.818727614116931],[42.69810001952389,1.7543834191753722]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<span title="Proyecto LIFE NITRAZENS">Life-Nitrazens</span> &middot; <a href="https://qgis.org" target="_blank" rel="noopener noreferrer">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        // Buscador fijo con sugerencias automáticas.
        // Las sugerencias de localidades y códigos postales se obtienen de Open-Meteo,
        // que admite búsquedas parciales y solicitudes directas desde el navegador.
        // Si el usuario pulsa Intro, Nominatim queda como respaldo para direcciones completas.
        var searchMarker = null;
        var autocompleteTimer = null;
        var autocompleteController = null;
        var lastAutocompleteQuery = '';
        var lastAutocompleteResults = [];
        var activeFallbackScript = null;
        var activeFallbackTimeout = null;

        function removeFallbackRequest() {
            if (activeFallbackTimeout) {
                clearTimeout(activeFallbackTimeout);
                activeFallbackTimeout = null;
            }
            if (activeFallbackScript && activeFallbackScript.parentNode) {
                activeFallbackScript.parentNode.removeChild(activeFallbackScript);
            }
            activeFallbackScript = null;
        }

        function FixedSearchControl(options) {
            this.options = options || {};
        }

        FixedSearchControl.prototype = Object.create(L.Control.prototype);
        FixedSearchControl.prototype.constructor = FixedSearchControl;
        FixedSearchControl.prototype.options = { position: 'topleft' };

        FixedSearchControl.prototype.onAdd = function(map) {
            var container = L.DomUtil.create('div', 'leaflet-control fixed-search-control');
            container.innerHTML =
                '<form class="fixed-search-form" role="search">' +
                    '<input class="fixed-search-input" type="search" ' +
                        'placeholder="Buscar localidad o dirección" ' +
                        'aria-label="Buscar localidad o dirección" autocomplete="off">' +
                    '<button class="fixed-search-button" type="submit" ' +
                        'aria-label="Buscar" title="Buscar">&#128269;</button>' +
                '</form>' +
                '<div class="fixed-search-status" aria-live="polite"></div>' +
                '<div class="fixed-search-results" role="listbox"></div>';

            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);

            var form = container.querySelector('.fixed-search-form');
            var input = container.querySelector('.fixed-search-input');
            var status = container.querySelector('.fixed-search-status');
            var resultsBox = container.querySelector('.fixed-search-results');

            function closeResults() {
                resultsBox.innerHTML = '';
                resultsBox.style.display = 'none';
            }

            function showStatus(message, isError) {
                status.textContent = message || '';
                status.classList.toggle('is-error', Boolean(isError));
                status.style.display = message ? 'block' : 'none';
            }

            function cancelPendingSearch() {
                if (autocompleteTimer) {
                    clearTimeout(autocompleteTimer);
                    autocompleteTimer = null;
                }
                if (autocompleteController) {
                    autocompleteController.abort();
                    autocompleteController = null;
                }
            }

            function uniqueParts(values) {
                var parts = [];
                values.forEach(function(value) {
                    value = String(value || '').trim();
                    if (value && parts.indexOf(value) === -1) parts.push(value);
                });
                return parts;
            }

            function normalizeOpenMeteoResult(result) {
                if (!result) return null;
                var lat = Number(result.latitude);
                var lon = Number(result.longitude);
                if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;

                var name = String(result.name || '').trim();
                var details = uniqueParts([
                    result.admin4,
                    result.admin3,
                    result.admin2,
                    result.admin1,
                    result.country
                ]).filter(function(value) { return value !== name; });

                return {
                    lat: lat,
                    lon: lon,
                    display_name: [name, details.join(', ')].filter(Boolean).join(', ') || 'Resultado sin nombre',
                    bounds: null,
                    countrycode: String(result.country_code || '').toUpperCase()
                };
            }

            function normalizeNominatimResult(result) {
                if (!result) return null;
                var lat = Number(result.lat);
                var lon = Number(result.lon);
                if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;

                var bounds = null;
                if (Array.isArray(result.boundingbox) && result.boundingbox.length === 4) {
                    var south = Number(result.boundingbox[0]);
                    var north = Number(result.boundingbox[1]);
                    var west = Number(result.boundingbox[2]);
                    var east = Number(result.boundingbox[3]);
                    if ([south, north, west, east].every(Number.isFinite)) {
                        bounds = [[south, west], [north, east]];
                    }
                }

                return {
                    lat: lat,
                    lon: lon,
                    display_name: result.display_name || 'Resultado sin nombre',
                    bounds: bounds,
                    countrycode: String((result.address && result.address.country_code) || '').toUpperCase()
                };
            }

            function deduplicateResults(results) {
                var seen = {};
                return results.filter(function(result) {
                    var key = result.lat.toFixed(5) + ',' + result.lon.toFixed(5) + '|' + result.display_name;
                    if (seen[key]) return false;
                    seen[key] = true;
                    return true;
                });
            }

            function goToResult(result) {
                var lat = Number(result.lat);
                var lon = Number(result.lon);
                if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

                if (searchMarker) map.removeLayer(searchMarker);
                searchMarker = L.marker([lat, lon]).addTo(map);
                searchMarker.bindPopup(result.display_name || input.value).openPopup();

                if (Array.isArray(result.bounds)) {
                    map.fitBounds(result.bounds, {maxZoom: 15, padding: [30, 30]});
                } else {
                    map.setView([lat, lon], 14);
                }

                input.value = result.display_name || input.value;
                closeResults();
                showStatus('');
            }

            function renderResults(results) {
                closeResults();
                lastAutocompleteResults = Array.isArray(results) ? results : [];

                if (lastAutocompleteResults.length === 0) {
                    showStatus('No se han encontrado resultados.', true);
                    return;
                }

                showStatus('');
                lastAutocompleteResults.forEach(function(result) {
                    var button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'fixed-search-result';
                    button.setAttribute('role', 'option');
                    button.textContent = result.display_name;
                    button.addEventListener('click', function() {
                        goToResult(result);
                    });
                    resultsBox.appendChild(button);
                });
                resultsBox.style.display = 'block';
            }

            function searchWithNominatim(query) {
                removeFallbackRequest();
                showStatus('Buscando dirección…');

                var callbackName = '__nitra_search_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
                var cleaned = false;

                function cleanup() {
                    if (cleaned) return;
                    cleaned = true;
                    removeFallbackRequest();
                    try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
                }

                window[callbackName] = function(results) {
                    cleanup();
                    if (input.value.trim() !== query) return;
                    var normalized = (Array.isArray(results) ? results : [])
                        .map(normalizeNominatimResult)
                        .filter(Boolean)
                        .slice(0, 6);
                    lastAutocompleteQuery = query;
                    renderResults(normalized);
                };

                activeFallbackScript = document.createElement('script');
                activeFallbackScript.async = true;
                activeFallbackScript.onerror = function() {
                    cleanup();
                    showStatus('No se pudo conectar con el servicio de búsqueda. Inténtalo de nuevo más tarde.', true);
                };

                var params = [
                    'format=jsonv2',
                    'limit=6',
                    'addressdetails=1',
                    'countrycodes=es,pt',
                    'accept-language=es',
                    'q=' + encodeURIComponent(query),
                    'json_callback=' + encodeURIComponent(callbackName)
                ];
                activeFallbackScript.src = 'https://nominatim.openstreetmap.org/search?' + params.join('&');
                document.head.appendChild(activeFallbackScript);

                activeFallbackTimeout = setTimeout(function() {
                    cleanup();
                    showStatus('La búsqueda está tardando demasiado. Inténtalo de nuevo.', true);
                }, 12000);
            }

            function searchPlace(query, manualSearch) {
                query = (query || '').trim();
                cancelPendingSearch();

                if (query.length < 3) {
                    lastAutocompleteQuery = '';
                    lastAutocompleteResults = [];
                    closeResults();
                    showStatus('');
                    return;
                }

                lastAutocompleteQuery = query;
                showStatus('Buscando…');

                autocompleteController = new AbortController();
                var params = new URLSearchParams({
                    name: query,
                    count: '20',
                    language: 'es',
                    format: 'json'
                });

                fetch('https://geocoding-api.open-meteo.com/v1/search?' + params.toString(), {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-store',
                    signal: autocompleteController.signal
                })
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    if (input.value.trim() !== query) return;
                    var normalized = (data && Array.isArray(data.results) ? data.results : [])
                        .map(normalizeOpenMeteoResult)
                        .filter(Boolean)
                        .filter(function(result) {
                            return result.countrycode === 'ES' || result.countrycode === 'PT';
                        });
                    normalized = deduplicateResults(normalized).slice(0, 6);

                    if (normalized.length === 0 && manualSearch) {
                        searchWithNominatim(query);
                        return;
                    }
                    renderResults(normalized);
                })
                .catch(function(error) {
                    if (error && error.name === 'AbortError') return;
                    if (input.value.trim() !== query) return;
                    closeResults();
                    if (manualSearch) {
                        searchWithNominatim(query);
                    } else {
                        showStatus('No se pudieron cargar las sugerencias. Pulsa Intro para buscar.', true);
                    }
                })
                .finally(function() {
                    autocompleteController = null;
                });
            }

            function queueAutocomplete() {
                cancelPendingSearch();
                var query = input.value.trim();

                if (query.length < 3) {
                    lastAutocompleteQuery = '';
                    lastAutocompleteResults = [];
                    closeResults();
                    showStatus('');
                    return;
                }

                autocompleteTimer = setTimeout(function() {
                    searchPlace(query, false);
                }, 500);
            }

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                var query = input.value.trim();
                if (query.length < 3) {
                    closeResults();
                    showStatus('Escribe al menos tres caracteres.', true);
                    input.focus();
                    return;
                }
                if (query === lastAutocompleteQuery && lastAutocompleteResults.length > 0) {
                    renderResults(lastAutocompleteResults);
                } else {
                    searchPlace(query, true);
                }
            });

            input.addEventListener('input', queueAutocomplete);

            input.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    cancelPendingSearch();
                    removeFallbackRequest();
                    closeResults();
                    showStatus('');
                    input.blur();
                }
            });

            document.addEventListener('click', function(event) {
                if (!container.contains(event.target)) closeResults();
            });

            return container;
        };

        var fixedSearchControl = new FixedSearchControl({position: 'topleft'});
        fixedSearchControl.addTo(map);

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        // Forzamos el orden en el DOM para que el buscador quede arriba
        // y los botones de zoom (+ / -) aparezcan justo debajo.
        var topLeftControls = map._controlCorners && map._controlCorners.topleft;
        if (topLeftControls) {
            var searchContainer = fixedSearchControl.getContainer();
            var zoomContainer = zoomControl.getContainer();
            if (searchContainer && zoomContainer) {
                topLeftControls.insertBefore(searchContainer, topLeftControls.firstChild);
                topLeftControls.insertBefore(zoomContainer, searchContainer.nextSibling);
            }
        }

        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }

        var selectedZonaLayer = null;
        var selectedCuencaLayer = null;

        function getZonaHoverStyle(layer) {
            return {
                color: '#ff00ff',
                weight: 4,
                opacity: 0.7,
                fillOpacity: layer.options.fillOpacity ?? 0
            };
        }

        function applyZonaHover(layer) {
            if (selectedZonaLayer === layer) return;
            layer.setStyle(getZonaHoverStyle(layer));
            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function resetZonaStyle(layer) {
            if (selectedZonaLayer === layer) return;
            layer_ZonasNITRAZENScopiar_4.resetStyle(layer);
        }

        function toggleZonaSelection(layer) {
            if (selectedZonaLayer === layer) {
                layer_ZonasNITRAZENScopiar_4.resetStyle(layer);
                selectedZonaLayer = null;
                return;
            }

            if (selectedZonaLayer) {
                layer_ZonasNITRAZENScopiar_4.resetStyle(selectedZonaLayer);
            }

            selectedZonaLayer = layer;
            layer.setStyle(getZonaHoverStyle(layer));

            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function getCuencaHoverStyle(layer) {
            return {
                color: '#000000',
                weight: 2,
                opacity: 0.4,
                fillColor: layer.options.fillColor,
                fillOpacity: layer.options.fillOpacity ?? 1
            };
        }

        function applyCuencaHover(layer) {
            if (selectedCuencaLayer === layer) return;
            layer.setStyle(getCuencaHoverStyle(layer));
            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function resetCuencaStyle(layer) {
            if (selectedCuencaLayer === layer) return;

            if (layer._cuencaGroup === 'duero') {
                layer_hi_cuenca_s_ES020DUERO_1.resetStyle(layer);
            } else if (layer._cuencaGroup === 'ebro') {
                layer_hi_cuenca_s_ES091EBRO_2.resetStyle(layer);
            } else if (layer._cuencaGroup === 'mondego') {
                layer_Mondego_3.resetStyle(layer);
            }
        }

        function toggleCuencaSelection(layer) {
            if (selectedCuencaLayer === layer) {
                resetCuencaLayerDirect(layer);
                selectedCuencaLayer = null;
                return;
            }

            if (selectedCuencaLayer) {
                resetCuencaLayerDirect(selectedCuencaLayer);
            }

            selectedCuencaLayer = layer;
            layer.setStyle(getCuencaHoverStyle(layer));

            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function resetCuencaLayerDirect(layer) {
            if (layer._cuencaGroup === 'duero') {
                layer_hi_cuenca_s_ES020DUERO_1.resetStyle(layer);
            } else if (layer._cuencaGroup === 'ebro') {
                layer_hi_cuenca_s_ES091EBRO_2.resetStyle(layer);
            } else if (layer._cuencaGroup === 'mondego') {
                layer_Mondego_3.resetStyle(layer);
            }
        }

        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);

        function pop_hi_cuenca_s_ES020DUERO_1(feature, layer) {
            layer._cuencaGroup = 'duero';

            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nombre_es'] !== null ? autolinker.link(String(feature.properties['nombre_es']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nombre_pt'] !== null ? autolinker.link(String(feature.properties['nombre_pt']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nombre_en'] !== null ? autolinker.link(String(feature.properties['nombre_en']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);

            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });

            layer.on('popupclose', function() {
                if (selectedCuencaLayer === layer) {
                    resetCuencaLayerDirect(layer);
                    selectedCuencaLayer = null;
                }
            });

            layer.on({
                mouseover: function(e) {
                    applyCuencaHover(e.target);
                },
                mouseout: function(e) {
                    resetCuencaStyle(e.target);
                },
                click: function(e) {
                    L.DomEvent.stopPropagation(e);
                    toggleCuencaSelection(e.target);
                }
            });

            layer.bindPopup(content, { maxHeight: 400 });
        }

            return {

        map.createPane('pane_hi_cuenca_s_ES020DUERO_1');
        map.getPane('pane_hi_cuenca_s_ES020DUERO_1').style.zIndex = 401;
        map.getPane('pane_hi_cuenca_s_ES020DUERO_1').style['mix-blend-mode'] = 'normal';
        var layer_hi_cuenca_s_ES020DUERO_1 = new L.geoJson(json_hi_cuenca_s_ES020DUERO_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_hi_cuenca_s_ES020DUERO_1',
            layerName: 'layer_hi_cuenca_s_ES020DUERO_1',
            pane: 'pane_hi_cuenca_s_ES020DUERO_1',
            onEachFeature: pop_hi_cuenca_s_ES020DUERO_1,

        });
        bounds_group.addLayer(layer_hi_cuenca_s_ES020DUERO_1);
        map.addLayer(layer_hi_cuenca_s_ES020DUERO_1);

            var popupContent = '<table>\

        function style_hi_cuenca_s_ES091EBRO_2_0() {
            return {
                pane: 'pane_hi_cuenca_s_ES091EBRO_2',
                opacity: 1,

        function escapeAmbassadorHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function pop_Embajadores_5(feature, layer) {
            var p = feature.properties || {};
            var entity = p.entidad
                ? '<div class="ambassador-popup-entity">' + escapeAmbassadorHtml(p.entidad) + '</div>'
                : '';
            var popupContent =
                '<div class="ambassador-popup">' +
                    '<div class="ambassador-popup-kicker"><i class="fas fa-user" aria-hidden="true"></i> Embajador/a LIFE-NITRAZENS</div>' +
                    '<div class="ambassador-popup-title">' + escapeAmbassadorHtml(p.nombre) + '</div>' +
                    entity +
                    '<div class="ambassador-popup-meta">Provincia de ' + escapeAmbassadorHtml(p.provincia) + '</div>' +
                    '<div class="ambassador-popup-note">' + escapeAmbassadorHtml(p.nota) + '</div>' +
                '</div>';

            layer.bindPopup(popupContent, {maxWidth: 310});
            layer.bindTooltip(escapeAmbassadorHtml(p.etiqueta || p.nombre), {
                direction: 'right',

        function AmbassadorControl(options) {
            this.options = options || {};
        }
        AmbassadorControl.prototype = Object.create(L.Control.prototype);
        AmbassadorControl.prototype.constructor = AmbassadorControl;
        AmbassadorControl.prototype.options = {position: 'bottomright'};
        AmbassadorControl.prototype.onAdd = function() {
            var container = L.DomUtil.create('div', 'leaflet-control ambassador-control');
            container.innerHTML =
                '<label class="ambassador-control-label">' +
                    '<input class="ambassador-control-checkbox" type="checkbox" checked>' +
                    '<span class="ambassador-control-symbol"><i class="fas fa-user" aria-hidden="true"></i></span>' +
                    '<span>Embajadores</span>' +
                '</label>';
            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);
            var checkbox = container.querySelector('.ambassador-control-checkbox');
            checkbox.addEventListener('change', function() {
                if (checkbox.checked) {
                    if (!map.hasLayer(layer_Embajadores_5)) map.addLayer(layer_Embajadores_5);
                } else if (map.hasLayer(layer_Embajadores_5)) {
                    map.removeLayer(layer_Embajadores_5);
                }
            });
            map.on('layeradd layerremove', function(event) {
                if (event.layer === layer_Embajadores_5) {
                    checkbox.checked = map.hasLayer(layer_Embajadores_5);
                }
            });
            return container;
        };
        new AmbassadorControl({position: 'bottomright'}).addTo(map);
